name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    name: web (typecheck + lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: |
          if [ -f package-lock.json ]; then npm ci; else echo "no lockfile yet — skipping"; fi
      - name: Typecheck
        run: |
          if [ -f tsconfig.json ]; then npx tsc --noEmit; else echo "no tsconfig yet — skipping"; fi
      - name: Lint
        run: |
          if [ -f package.json ] && npm run -s lint --if-present; then :; else echo "no lint script — skipping"; fi

  backend:
    name: backend (test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else echo "no requirements.txt yet — skipping"; fi
      - name: Test
        run: |
          if [ -d tests ]; then pytest -q; else echo "no tests/ yet — skipping"; fi
